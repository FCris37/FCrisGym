const TYPE_COLORS = { boxing: "#a78bfa", strength: "#f97316", cardio: "#38bdf8", rest: "#22c55e" };
const BADGE_STYLES = {

function initSets(exercises) {
  const s = {};
  exercises.forEach((ex, i) => {
    s[i] = Array.from({ length: ex.sets }, () => ({ reps: ex.reps, weight: ex.weight ? "" : "-", done: false }));
  });
  return s;
}

function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2200); return () => clearTimeout(t); }, []);
  return (
    <div style={{ position: "fixed", top: 20, left: "50%", transform: "translateX(-50%)", background: "#22c55e", color: "#fff", padding: "12px 24px", borderRadius: 12, fontSize: 14, fontWeight: 700, zIndex: 999, whiteSpace: "nowrap", boxShadow: "0 4px 20px rgba(0,0,0,0.4)" }}>{msg}</div>
  );
}

function Timer({ seconds, onStop }) {
  const [left, setLeft] = useState(seconds);
  useEffect(() => {
    if (left <= 0) { onStop(); return; }
    const t = setTimeout(() => setLeft(l => l - 1), 1000);
    return () => clearTimeout(t);
  }, [left]);
  return (
    <div style={{ position: "fixed", bottom: 88, left: "50%", transform: "translateX(-50%)", background: "#161b26", border: "1px solid #f97316", borderRadius: 16, padding: "12px 24px", display: "flex", alignItems: "center", gap: 16, zIndex: 200, boxShadow: "0 8px 32px rgba(0,0,0,0.5)", maxWidth: 280, width: "90%" }}>
      <div>
        <div style={{ fontSize: 11, color: "#64748b", fontWeight: 600, letterSpacing: 1 }}>⏱ DESCANSO</div>
        <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 36, color: "#f97316", lineHeight: 1 }}>{left}s</div>
      </div>
      <button onClick={onStop} style={{ marginLeft: "auto", background: "none", border: "none", color: "#64748b", fontSize: 20, cursor: "pointer" }}>✕</button>
    </div>
  );
}

function ExerciseCard({ ex, idx, sets, onSetChange, onTimerStart }) {
  function toggleDone(si) {
    const updated = sets.map((s, i) => i === si ? { ...s, done: !s.done } : s);
    onSetChange(idx, updated);
    if (!sets[si].done && ex.timer > 0) onTimerStart(ex.timer);
  }
  function updateField(si, field, val) {
    onSetChange(idx, sets.map((s, i) => i === si ? { ...s, [field]: val } : s));
  }
  function addSet() {
    const last = sets[sets.length - 1];
    onSetChange(idx, [...sets, { reps: last.reps, weight: last.weight, done: false }]);
  }
  return (
    <div style={{ background: "#161b26", border: "1px solid #1f2535", borderRadius: 14, marginBottom: 12, overflow: "hidden" }}>
      <div style={{ padding: "14px 16px", display: "flex", alignItems: "center", gap: 10 }}>
        <span style={{ fontSize: 22 }}>{ex.icon}</span>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 15, color: "#e2e8f0" }}>{ex.name}</div>
          <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>{ex.desc}</div>
        </div>
        {ex.video && (
          <a href={"https://www.youtube.com/watch?v=" + ex.video} target="_blank" rel="noreferrer"
            style={{ display: "flex", alignItems: "center", gap: 5, background: "rgba(255,0,0,0.12)", border: "1px solid rgba(255,60,60,0.3)", borderRadius: 8, padding: "7px 11px", color: "#ff5555", fontSize: 11, fontWeight: 700, textDecoration: "none", whiteSpace: "nowrap", flexShrink: 0 }}>
            ▶ YouTube
          </a>
        )}
      </div>
      {ex.tip && (
        <div style={{ margin: "0 16px 12px", background: "#10131a", border: "1px solid #1f2535", borderRadius: 10, padding: "10px 12px", fontSize: 12, color: "#64748b", lineHeight: 1.5 }}>
          💡 {ex.tip}
        </div>
      )}
      <div style={{ padding: "0 16px 14px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "32px 1fr 1fr 40px", gap: 8, marginBottom: 6 }}>
          {["#", "Reps", ex.weight ? "kg" : "", "✓"].map((l, i) => (
            <div key={i} style={{ fontSize: 10, color: "#64748b", fontWeight: 700, textAlign: "center", textTransform: "uppercase", letterSpacing: "0.5px" }}>{l}</div>
          ))}
        </div>
        {sets.map((s, si) => (
          <div key={si} style={{ display: "grid", gridTemplateColumns: "32px 1fr 1fr 40px", gap: 8, alignItems: "center", marginBottom: 8 }}>
            <div style={{ fontSize: 12, color: "#64748b", fontWeight: 700, textAlign: "center" }}>{si + 1}</div>
            <input type="text" inputMode="decimal" value={s.reps} onChange={e => updateField(si, "reps", e.target.value)}
              style={{ background: s.done ? "rgba(34,197,94,0.12)" : "#10131a", border: s.done ? "1px solid #22c55e" : "1px solid #1f2535", borderRadius: 10, padding: "10px 12px", color: s.done ? "#22c55e" : "#e2e8f0", fontSize: 14, fontWeight: 600, textAlign: "center", width: "100%", outline: "none" }} />
            <input type={ex.weight ? "number" : "text"} inputMode="decimal" value={ex.weight ? (s.weight || "") : "-"} readOnly={!ex.weight}
              onChange={e => ex.weight && updateField(si, "weight", e.target.value)}
              style={{ background: s.done ? "rgba(34,197,94,0.12)" : "#10131a", border: s.done ? "1px solid #22c55e" : "1px solid #1f2535", borderRadius: 10, padding: "10px 12px", color: s.done ? "#22c55e" : (ex.weight ? "#e2e8f0" : "#64748b"), fontSize: 14, fontWeight: 600, textAlign: "center", width: "100%", outline: "none", pointerEvents: ex.weight ? "auto" : "none" }} />
            <button onClick={() => toggleDone(si)}
              style={{ width: 36, height: 36, borderRadius: 10, border: s.done ? "1px solid #22c55e" : "1px solid #1f2535", background: s.done ? "rgba(34,197,94,0.12)" : "#10131a", color: s.done ? "#22c55e" : "#64748b", fontSize: 16, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
              {s.done ? "✓" : "○"}
            </button>
          </div>
        ))}
        <button onClick={addSet} style={{ width: "100%", padding: 8, background: "none", border: "1px dashed #1f2535", borderRadius: 10, color: "#64748b", fontSize: 12, fontWeight: 600, cursor: "pointer", marginTop: 4 }}>+ Añadir serie</button>
        {sets.length > 1 && (
          <button onClick={() => onSetChange(idx, sets.slice(0, -1))} style={{ width: "100%", padding: 8, background: "none", border: "1px dashed rgba(239,68,68,0.3)", borderRadius: 10, color: "#ef4444", fontSize: 12, fontWeight: 600, cursor: "pointer", marginTop: 6 }}>− Eliminar última serie</button>
        )}
      </div>
    </div>
  );
}

function DietDayCard({ d }) {

  const color = TYPE_COLORS[d.type];

    <div style={{ background: "#161b26", border: "1px solid #1f2535", borderRadius: 14, marginBottom: 10, overflow: "hidden", borderLeft: "3px solid " + color }}>

        <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 36, color, lineHeight: 1, minWidth: 32 }}>{d.label}</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 16, color: "#e2e8f0" }}>{d.day}</div>
          <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>{d.note}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 22, color, lineHeight: 1 }}>{d.kcal}</div>
          <div style={{ fontSize: 10, color: "#64748b" }}>kcal</div>
        </div>
        <div style={{ color: "#64748b", fontSize: 14, marginLeft: 4 }}>{open ? "▲" : "▼"}</div>
      </div>
      {open && (
        <div style={{ padding: "0 16px 16px" }}>
          {d.meals.map((m, i) => (
            <div key={i} style={{ background: "#10131a", border: "1px solid #1f2535", borderRadius: 10, padding: "12px", marginBottom: 8 }}>
              <div style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "1.5px", color: "#38bdf8", fontWeight: 700, marginBottom: 4 }}>{m.time}</div>
              <div style={{ fontSize: 13, fontWeight: 500, color: "#e2e8f0", lineHeight: 1.4 }}>{m.name}</div>
              <div style={{ fontSize: 11, color: "#64748b", marginTop: 4 }}>~{m.kcal} kcal</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState("home");
  const [currentDay, setCurrentDay] = useState(null);
  const [sets, setSets] = useState({});
  const [history, setHistory] = useState(() => { try { return JSON.parse(localStorage.getItem("gymHistory5") || "[]"); } catch { return []; } });
  const [weightKg, setWeightKg] = useState(() => parseFloat(localStorage.getItem("currentWeight") || "102"));
  const [weightInput, setWeightInput] = useState("");
  const [timerSecs, setTimerSecs] = useState(null);
  const [toast, setToast] = useState(null);

  useEffect(() => { setWeightInput(String(weightKg)); }, [weightKg]);

  function saveHistory(h) { setHistory(h); try { localStorage.setItem("gymHistory5", JSON.stringify(h)); } catch {} }

  function openDay(day) {
    setCurrentDay(day);
    setSets(day.exercises ? initSets(day.exercises) : {});
    setScreen("workout");
  }

  function handleSetChange(idx, updated) { setSets(prev => ({ ...prev, [idx]: updated })); }

  function finishWorkout() {
    const entry = {
      id: Date.now(), day: currentDay.name, type: currentDay.type,
      date: new Date().toLocaleDateString("es-ES", { weekday: "short", day: "numeric", month: "short" }),
      timestamp: Date.now(),
      exercises: (currentDay.exercises || []).map((ex, i) => ({
        name: ex.name, done: (sets[i] || []).filter(s => s.done).length,
        total: (sets[i] || []).length, data: sets[i] || []
      }))
    };
    saveHistory([entry, ...history]);
    setTimerSecs(null);
    setToast("✅ Entrenamiento guardado!");
    setScreen("home");
  }

  function logBoxing() {
    const entry = {
      id: Date.now(), day: currentDay.name, type: "boxing",
      date: new Date().toLocaleDateString("es-ES", { weekday: "short", day: "numeric", month: "short" }),
      timestamp: Date.now(), exercises: [{ name: "Clase de Boxeo", done: 1, total: 1, data: [] }]
    };
    saveHistory([entry, ...history]);
    setToast("🥊 ¡Clase registrada!");
    setScreen("home");
  }

  function saveWeight() {
    const val = parseFloat(weightInput);
    if (!isNaN(val) && val > 0) {
      setWeightKg(val);
      try { localStorage.setItem("currentWeight", String(val)); } catch {}
      setToast("⚖️ Peso actualizado!");
    }
  }

  const lost = Math.max(0, 104 - weightKg);
  const pct = Math.min(100, (lost / 19) * 100);
  const now = new Date();
  const dayNames = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];

  const NAV = [
    { id: "home", icon: "💪", label: "ENTRENO" },
    { id: "diet", icon: "🥗", label: "DIETA" },
    { id: "history", icon: "📋", label: "HISTORIAL" },
    { id: "stats", icon: "📊", label: "STATS" },
  ];

  const appStyle = { background: "#080a0f", color: "#e2e8f0", fontFamily: "'Syne', sans-serif", height: "100vh", display: "flex", flexDirection: "column", maxWidth: 480, margin: "0 auto", position: "relative" };
  const topBar = { padding: "20px 16px 12px", flexShrink: 0 };
  const h1Style = { fontFamily: "'Bebas Neue', sans-serif", fontSize: 32, letterSpacing: 2, lineHeight: 1, color: "#fff", margin: 0 };
  const scrollBody = { flex: 1, overflowY: "auto", padding: "16px 16px 24px" };
  const navStyle = { width: "100%", maxWidth: 480, background: "transparent", display: "flex", flexShrink: 0, padding: "12px 0 8px" };
  const sectionTitle = { fontSize: 11, textTransform: "uppercase", letterSpacing: 2, color: "#64748b", fontWeight: 700, margin: "0 0 10px" };

  return (
    <div style={appStyle}>
      <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />

      {/* ── HOME ── */}
      {screen === "home" && (
        <>
          <div style={navStyle}>
            {NAV.map(btn => (
              <button key={btn.id} onClick={() => setScreen(btn.id)}
                style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "8px 4px", background: "none", border: "none", cursor: "pointer", color: screen === btn.id ? "#f97316" : "#64748b", fontFamily: "'Syne',sans-serif", fontSize: 10, fontWeight: 600, letterSpacing: "0.5px" }}>
                <span style={{ fontSize: 20 }}>{btn.icon}</span>
                {btn.label}
              </button>
            ))}
          </div>
          <div style={topBar}>
            <h1 style={h1Style}>GYM<span style={{ color: "#f97316" }}>TRACKER</span></h1>
            <p style={{ color: "#64748b", fontSize: 13, marginTop: 4 }}>{dayNames[now.getDay()]}, {now.toLocaleDateString("es-ES", { day: "numeric", month: "long" })}</p>
          </div>
          <div style={scrollBody}>
            <div style={{ marginBottom: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#64748b", marginBottom: 6 }}>
                <span>Objetivo: 104 → 85 kg</span><span>{lost.toFixed(1)} kg perdidos</span>
              </div>
              <div style={{ height: 6, background: "#1f2535", borderRadius: 99, overflow: "hidden" }}>
                <div style={{ height: "100%", width: pct + "%", background: "linear-gradient(90deg,#f97316,#fbbf24)", borderRadius: 99, transition: "width 0.5s" }} />
              </div>
            </div>
            <div style={sectionTitle}>Esta semana</div>
            {DAYS.map(day => (
              <div key={day.id} onClick={() => openDay(day)}
                style={{ background: "#161b26", border: "1px solid #1f2535", borderRadius: 16, padding: 16, cursor: "pointer", display: "flex", alignItems: "center", gap: 14, position: "relative", overflow: "hidden", marginBottom: 10, borderLeft: "3px solid " + TYPE_COLORS[day.type] }}>
                <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 36, color: TYPE_COLORS[day.type], lineHeight: 1, minWidth: 32 }}>{day.label}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 16 }}>{day.name}</div>
                  <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>{day.focus}</div>
                </div>
                <span style={{ fontSize: 10, fontWeight: 700, padding: "4px 10px", borderRadius: 99, letterSpacing: "0.5px", ...BADGE_STYLES[day.type] }}>{day.badge}</span>
              </div>
            ))}
          </div>
        </>
      )}

      {/* ── WORKOUT ── */}
      {screen === "workout" && currentDay && (
        <>
          <div style={{ padding: "16px 16px 0", flexShrink: 0, borderBottom: "1px solid #1f2535" }}>
            <button onClick={() => setScreen("home")} style={{ background: "none", border: "none", color: "#f97316", fontFamily: "'Syne',sans-serif", fontSize: 14, fontWeight: 700, cursor: "pointer", padding: 0, marginBottom: 12 }}>← Volver</button>
            <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 28, letterSpacing: 1, color: "#fff" }}>{currentDay.name.toUpperCase()}</div>
            <div style={{ fontSize: 13, color: "#64748b", marginTop: 2, marginBottom: 12 }}>{currentDay.focus}</div>
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: "16px 16px 24px" }}>
            {currentDay.boxing ? (
              <>
                <div style={{ background: "linear-gradient(135deg,rgba(167,139,250,0.1),rgba(167,139,250,0.03))", border: "1px solid rgba(167,139,250,0.25)", borderRadius: 14, padding: 20, textAlign: "center", marginBottom: 16 }}>
                  <div style={{ fontSize: 64, marginBottom: 12 }}>🥊</div>
                  <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 28, color: "#a78bfa" }}>CLASE DE BOXEO</div>
                  <div style={{ fontSize: 14, color: "#64748b", marginTop: 8, lineHeight: 1.6 }}>1 hora con el entrenador · 500-700 kcal<br /><br />⚡ Come algo ligero 1-2h antes (plátano + tostada) y cena con proteína después.</div>
                </div>
                <button onClick={logBoxing} style={{ width: "100%", padding: 16, background: "linear-gradient(135deg,#a78bfa,#7c3aed)", border: "none", borderRadius: 14, color: "#fff", fontFamily: "'Syne',sans-serif", fontSize: 16, fontWeight: 800, cursor: "pointer" }}>✅ Registrar clase completada</button>
              </>
            ) : currentDay.rest ? (
              <div style={{ background: "rgba(34,197,94,0.07)", border: "1px solid rgba(34,197,94,0.2)", borderRadius: 14, padding: 20, textAlign: "center" }}>
                <div style={{ fontSize: 64, marginBottom: 12 }}>😴</div>
                <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 28, color: "#22c55e" }}>DÍA DE DESCANSO</div>
                <div style={{ fontSize: 14, color: "#64748b", marginTop: 8, lineHeight: 1.6 }}>Tu cuerpo crece y se recupera cuando descansa.<br />Puedes hacer 10-15 min de estiramientos si quieres.</div>
              </div>
            ) : (
              <>
                {currentDay.exercises.map((ex, i) => (
                  <ExerciseCard key={i} ex={ex} idx={i} sets={sets[i] || []} onSetChange={handleSetChange} onTimerStart={secs => setTimerSecs(secs)} />
                ))}
                <button onClick={finishWorkout} style={{ width: "100%", padding: 16, background: "linear-gradient(135deg,#f97316,#ea580c)", border: "none", borderRadius: 14, color: "#fff", fontFamily: "'Syne',sans-serif", fontSize: 16, fontWeight: 800, cursor: "pointer", marginTop: 8 }}>
                  💪 Finalizar entrenamiento
                </button>
              </>
            )}
          </div>
        </>
      )}

      {/* ── DIETA ── */}
      {screen === "diet" && (
        <>
          <div style={navStyle}>
            {NAV.map(btn => (
              <button key={btn.id} onClick={() => setScreen(btn.id)}
                style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "8px 4px", background: "none", border: "none", cursor: "pointer", color: screen === btn.id ? "#f97316" : "#64748b", fontFamily: "'Syne',sans-serif", fontSize: 10, fontWeight: 600, letterSpacing: "0.5px" }}>
                <span style={{ fontSize: 20 }}>{btn.icon}</span>
                {btn.label}
              </button>
            ))}
          </div>
          <div style={topBar}>
            <h1 style={h1Style}>PLAN DE<span style={{ color: "#22c55e" }}> DIETA</span></h1>
            <p style={{ color: "#64748b", fontSize: 13, marginTop: 4 }}>~1.800 kcal/día · Sin legumbres</p>
          </div>
          <div style={scrollBody}>
            <div style={{ background: "linear-gradient(135deg,rgba(34,197,94,0.08),rgba(56,189,248,0.05))", border: "1px solid rgba(34,197,94,0.2)", borderRadius: 12, padding: 14, marginBottom: 16 }}>
              <div style={{ fontWeight: 700, fontSize: 14, color: "#22c55e", marginBottom: 6 }}>🎯 Tu objetivo calórico</div>
              <div style={{ fontSize: 13, color: "#64748b", lineHeight: 1.6 }}>
                Días normales: <strong style={{ color: "#e2e8f0" }}>~1.800 kcal</strong><br />
                Días de boxeo (L/J): <strong style={{ color: "#a78bfa" }}>~2.000 kcal</strong><br />
                Sábado flexible: <strong style={{ color: "#38bdf8" }}>~1.900 kcal</strong>
              </div>
            </div>
            <div style={sectionTitle}>Menú semanal · Toca para ver</div>
            {DIET.map((d, i) => <DietDayCard key={i} d={d} />)}
            <div style={{ background: "#161b26", border: "1px solid #1f2535", borderRadius: 12, padding: 14, marginTop: 8 }}>
              <div style={{ fontWeight: 700, fontSize: 13, color: "#f97316", marginBottom: 8 }}>💡 Reglas básicas</div>
              {["Bebe 2,5-3 litros de agua al día", "60g de arroz/pasta en seco = ~180g cocido", "Las comidas son intercambiables entre días", "Un capricho el sábado no arruina nada"].map((tip, i) => (
                <div key={i} style={{ fontSize: 12, color: "#64748b", marginBottom: 6, paddingLeft: 12, borderLeft: "2px solid #1f2535" }}>
                  {tip}
                </div>
              ))}
            </div>
          </div>
        </>
      )}

      {/* ── HISTORIAL ── */}
      {screen === "history" && (
        <>
          <div style={navStyle}>
            {NAV.map(btn => (
              <button key={btn.id} onClick={() => setScreen(btn.id)}
                style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "8px 4px", background: "none", border: "none", cursor: "pointer", color: screen === btn.id ? "#f97316" : "#64748b", fontFamily: "'Syne',sans-serif", fontSize: 10, fontWeight: 600, letterSpacing: "0.5px" }}>
                <span style={{ fontSize: 20 }}>{btn.icon}</span>
                {btn.label}
              </button>
            ))}
          </div>
          <div style={topBar}>
            <h1 style={h1Style}>HISTO<span style={{ color: "#f97316" }}>RIAL</span></h1>
            <p style={{ color: "#64748b", fontSize: 13, marginTop: 4 }}>Tus entrenamientos guardados</p>
          </div>
          <div style={scrollBody}>
            {history.length === 0 ? (
              <div style={{ textAlign: "center", padding: "60px 20px", color: "#64748b", fontSize: 14 }}>
                <div style={{ fontSize: 48, marginBottom: 12 }}>📋</div>
                Aún no hay entrenamientos.<br />¡Completa tu primer día!
              </div>
            ) : history.map(e => (
              <div key={e.id} style={{ background: "#161b26", border: "1px solid #1f2535", borderRadius: 14, padding: 16, marginBottom: 10 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                  <div>
                    <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 22, color: "#f97316" }}>{e.day.toUpperCase()}</div>
                    <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>{e.date}</div>
                  </div>
                  <button onClick={() => saveHistory(history.filter(x => x.id !== e.id))} style={{ background: "none", border: "none", color: "#64748b", cursor: "pointer", fontSize: 16 }}>🗑</button>
                </div>
                {e.exercises.map((ex, i) => (
                  <div key={i} style={{ fontSize: 13, color: "#64748b", marginBottom: 4 }}>
                    {ex.name} <span style={{ fontSize: 11 }}>{ex.done}/{ex.total} series
                      {ex.data && ex.data.filter(s => s.done && s.weight && s.weight !== "-").length > 0
                        ? " · " + ex.data.filter(s => s.done && s.weight && s.weight !== "-").map(s => s.weight + "kg").join(", ")
                        : ""}
                    </span>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </>
      )}

      {/* ── STATS ── */}
      {screen === "stats" && (
        <>
          <div style={navStyle}>
            {NAV.map(btn => (
              <button key={btn.id} onClick={() => setScreen(btn.id)}
                style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "8px 4px", background: "none", border: "none", cursor: "pointer", color: screen === btn.id ? "#f97316" : "#64748b", fontFamily: "'Syne',sans-serif", fontSize: 10, fontWeight: 600, letterSpacing: "0.5px" }}>
                <span style={{ fontSize: 20 }}>{btn.icon}</span>
                {btn.label}
              </button>
            ))}
          </div>
          <div style={topBar}>
            <h1 style={h1Style}>ESTA<span style={{ color: "#f97316" }}>DÍSTICAS</span></h1>
            <p style={{ color: "#64748b", fontSize: 13, marginTop: 4 }}>Tu progreso de un vistazo</p>
          </div>
          <div style={scrollBody}>
            <div style={sectionTitle}>Tu peso actual</div>
            <div style={{ background: "#161b26", border: "1px solid #1f2535", borderRadius: 14, padding: 16, marginBottom: 16 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, color: "#64748b", marginBottom: 6 }}>Actualiza tu peso para ver el progreso</div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <input type="number" step="0.1" value={weightInput} onChange={e => setWeightInput(e.target.value)} inputMode="decimal"
                      style={{ background: "#10131a", border: "1px solid #1f2535", borderRadius: 10, padding: "10px 12px", color: "#e2e8f0", fontSize: 14, fontWeight: 600, width: 90, outline: "none" }} />
                    <span style={{ color: "#64748b", fontSize: 14 }}>kg</span>
                    <button onClick={saveWeight} style={{ background: "#f97316", border: "none", borderRadius: 10, padding: "10px 16px", color: "#fff", fontFamily: "'Syne',sans-serif", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>Guardar</button>
                  </div>
                </div>
                <div style={{ textAlign: "center" }}>
                  <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 40, color: "#22c55e", lineHeight: 1 }}>{lost.toFixed(1)}</div>
                  <div style={{ fontSize: 10, color: "#64748b", fontWeight: 700, textTransform: "uppercase" }}>kg perdidos</div>
                </div>
              </div>
            </div>
            <div style={{ ...sectionTitle, margin: "0 0 10px" }}>Resumen</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
              {[
                { val: history.length, label: "Entrenamientos", color: "#f97316" },
                { val: history.filter(e => e.type === "boxing").length, label: "Clases Boxeo", color: "#a78bfa" },
                { val: history.filter(e => e.type === "strength").length, label: "Días Fuerza", color: "#f97316" },
                { val: history.filter(e => e.type === "cardio").length, label: "Días Cardio", color: "#38bdf8" },
              ].map((item, i) => (
                <div key={i} style={{ background: "#161b26", border: "1px solid #1f2535", borderRadius: 14, padding: 16, textAlign: "center" }}>
                  <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 36, color: item.color, lineHeight: 1 }}>{item.val}</div>
                  <div style={{ fontSize: 11, color: "#64748b", fontWeight: 700, textTransform: "uppercase", marginTop: 4, letterSpacing: "0.5px" }}>{item.label}</div>
                </div>
              ))}
            </div>
            <div style={{ ...sectionTitle, margin: "0 0 10px" }}>Progreso</div>
            <div style={{ background: "#161b26", border: "1px solid #1f2535", borderRadius: 14, padding: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "#64748b", marginBottom: 6 }}>
                <span>104 kg</span><span>85 kg</span>
              </div>
              <div style={{ height: 10, background: "#1f2535", borderRadius: 99, overflow: "hidden", marginBottom: 8 }}>
                <div style={{ height: "100%", width: pct + "%", background: "linear-gradient(90deg,#f97316,#fbbf24)", borderRadius: 99 }} />
              </div>
              <div style={{ textAlign: "center", fontSize: 13, color: "#64748b" }}>
                Te quedan <span style={{ color: "#f97316", fontWeight: 700 }}>{Math.max(0, weightKg - 85).toFixed(1)} kg</span> para tu objetivo
              </div>
            </div>
          </div>
        </>
      )}

      {timerSecs && <Timer seconds={timerSecs} onStop={() => setTimerSecs(null)} />}
      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
